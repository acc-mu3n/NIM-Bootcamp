apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-embedding-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nim-embedding
  template:
    metadata:
      labels:
        app: nim-embedding
    spec:
      imagePullSecrets:
      - name: ngc-docker-registry-secret
      containers:
      - name: nim-container
        image: nvcr.io/nim/nvidia/llama-3.2-nv-embedqa-1b-v2:1.3.0
        stdin: true
        tty: true
        env:
        - name: NGC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ngc-api-key-secret
              key: NGC_API_KEY
        - name: NIM_MODEL_NAME
          value: "/model"
        - name: NIM_SERVED_MODEL_NAME
          value: "llama-3.2-nv-embedqa-1b-v2"
        - name: NIM_CUSTOM_MODEL_NAME
          value: "llama-3.2-nv-embedqa-1b-v2"
        - name: NIM_ENABLE_KV_CACHE_REUSE
          value: "1"
        ports:
        - name: http-nim
          containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: "24Gi"
        startupProbe:
          httpGet:
            path: /v1/health/ready
            port: http-nim
          initialDelaySeconds: 40
          periodSeconds: 10
          failureThreshold: 180
        readinessProbe:
          httpGet:
            path: /v1/health/ready
            port: http-nim
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/health/live
            port: http-nim
          periodSeconds: 10
        volumeMounts:
        - name: cache-storage
          mountPath: /opt/nim/.cache
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      volumes:
      - name: cache-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nim-embedding-service
spec:
  type: LoadBalancer
  selector:
    app: nim-embedding
  ports:
    - protocol: TCP
      port: 8000
      targetPort: http-nim
