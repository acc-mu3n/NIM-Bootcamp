apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-embedding-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nim-embedding
  template:
    metadata:
      labels:
        app: nim-embedding
    spec:
      imagePullSecrets:
      - name: ngc-docker-registry-secret
      nodeSelector:
        cloud.google.com/compute-class: "Accelerator"
        cloud.google.com/gke-accelerator: "nvidia-l4"
      serviceAccountName: default
      containers:
      - name: nim-container
        image: nvcr.io/nim/nvidia/llama-3.2-nv-embedqa-1b-v2:1.3.0
        ports:
        - name: http-nim
          containerPort: 8000
        env:
        - name: NGC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ngc-api-key-secret
              key: NGC_API_KEY
        - name: NIM_MODEL_NAME
          value: "/model"
        - name: NIM_SERVED_MODEL_NAME
          value: "llama-3.2-nv-embedqa-1b-v2"
        - name: NIM_CUSTOM_MODEL_NAME
          value: "llama-3.2-nv-embedqa-1b-v2"
        resources:
          requests:
            cpu: "2"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            nvidia.com/gpu: "1"
        startupProbe:
          httpGet:
            path: /v1/health/ready
            port: http-nim
          initialDelaySeconds: 40
          periodSeconds: 10
          failureThreshold: 180
        readinessProbe:
          httpGet:
            path: /v1/health/ready
            port: http-nim
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v1/health/live
            port: http-nim
          periodSeconds: 10
        volumeMounts:
        - name: cache-storage
          mountPath: /opt/nim/.cache
      volumes:
      - name: cache-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nim-embedding-service
spec:
  type: LoadBalancer
  selector:
    app: nim-embedding
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
